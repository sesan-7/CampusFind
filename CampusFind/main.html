<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>main</title>
    <link rel="stylesheet" href="styles/instyles.css">
    <link rel="stylesheet" href="styles/instyles.css">
    <link rel="stylesheet" href="styles/main.css">


  </head>
  <body>
    <div class="header">
      <div class="logo1"><img src="img/logo.png" id="logo" alt="logo" class="logo">  </div>
      
      <h2 id="about">About</h2>
      <h2 id="service">service</h2>
      <h2 id="contact">contact</h2>
    </div>
    <div class="container2"></div>
    <div class="login">
        
      <h1>Login</h1>

      <form action="">
        <div class="imgcontainer">
            <img src="img/avatar.png" alt="Avatar" class="avatar">
          </div>
          <div class="inputs"> 
            <label for="email">email</label><span>
            <input type="text" id = "email" placeholder="email"><br>
            <label for="psw" >password</label><span>
            <input type="password" placeholder="password" id="psw"><br>
           <a href="" id="forget">Forget Passward?</a>
        </div>
       <button type="submit" >login</button>
      
    </form>
</div>


<div class="in-container">
      <h1>Institute</h1>
      <form action="">
        <div class="imgcontainer">
            <img src="img/avatar2.png" alt="Avatar" class="avatar">
          </div>
          <div class="inputs"> 
            <label for="institution">Institution Name</label><span>
            <input type="text" id = "in-name" placeholder="Enter Institution name"><br>
            <label for="in-type" >Institution-Type</label><span>
                <select name="in-type" id="in-type" >
                    <option value="College">College</option>
                    <option value="School">School</option>
                    <option value="Shop">Shop</option>
                   
                  </select><br>
        </div>
       <button type="submit" >Create</button>
      
    </form>
    </div>
  </body>
